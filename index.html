<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor UVG - Modelos de Desarrollo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uvg: {
                            green: '#0B5135',
                            dark: '#14253F',
                            light: '#E8F1EC'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="p-4 md:p-8">
        <!-- Login Section -->
        <div id="login-section" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-uvg-green mb-6 text-center">Acceso al Editor UVG</h2>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario o Correo</label>
                    <input type="text" id="login-email" value="mar251808@uvg.edu.gt" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-uvg-green outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="login-password" value="UVG2026" class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-uvg-green outline-none" required>
                </div>
                <button type="submit" id="login-btn" class="w-full bg-uvg-green text-white py-3 rounded-xl font-bold hover:bg-green-900 transition-colors">
                    Iniciar Sesión
                </button>
                <button type="button" onclick="resetPassword()" class="w-full text-sm text-uvg-green hover:underline">¿Olvidaste tu contraseña?</button>
            </form>

            <div class="my-6 flex items-center gap-3">
                <div class="flex-grow h-px bg-gray-300"></div>
                <span class="text-gray-500 text-sm">o conectar con</span>
                <div class="flex-grow h-px bg-gray-300"></div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="loginWithGoogle()" class="py-3 border rounded-xl hover:bg-gray-50"><i class="fa-brands fa-google text-red-500"></i></button>
                <button onclick="loginWithMicrosoft()" class="py-3 border rounded-xl hover:bg-gray-50"><i class="fa-brands fa-microsoft text-blue-600"></i></button>
                <button onclick="loginWithFacebook()" class="py-3 border rounded-xl hover:bg-gray-50"><i class="fa-brands fa-facebook text-blue-700"></i></button>
            </div>
            <p id="login-status" class="mt-4 text-center text-sm font-medium h-5"></p>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden max-w-4xl mx-auto">
            <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h1 class="text-2xl font-bold text-uvg-dark">Editor de Diapositivas</h1>
                <div class="flex gap-3">
                    <a href="dashboard.html" target="_blank" class="bg-uvg-green text-white px-5 py-2 rounded-xl font-semibold hover:bg-green-900">Proyectar Presentación</a>
                    <button onclick="logout()" class="text-red-500 font-semibold px-5 py-2">Salir</button>
                </div>
            </header>
            
            <div id="slides-editor" class="space-y-6">
                <!-- Diapositivas se cargan aquí -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, OAuthProvider, FacebookAuthProvider, onAuthStateChanged, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            databaseURL: "https://costos-comunicacion-digital-default-rtdb.firebaseio.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee",
            measurementId: "G-D7GGDWSWKY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // UI Logic
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginStatus = document.getElementById('login-status');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // Auth Functions
        window.loginWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.loginWithMicrosoft = () => signInWithPopup(auth, new OAuthProvider('microsoft.com'));
        window.loginWithFacebook = () => signInWithPopup(auth, new FacebookAuthProvider());
        window.logout = () => signOut(auth);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const finalEmail = email.includes('@') ? email : `${email}@uvg.edu.gt`;
            try {
                await signInWithEmailAndPassword(auth, finalEmail, pass);
            } catch (err) {
                loginStatus.innerText = "Error: " + err.message;
            }
        });

        window.resetPassword = async () => {
            const email = document.getElementById('login-email').value;
            if(!email) return alert("Ingresa tu correo primero");
            const finalEmail = email.includes('@') ? email : `${email}@uvg.edu.gt`;
            await sendPasswordResetEmail(auth, finalEmail);
            alert("Enlace de recuperación enviado a " + finalEmail);
        };
    </script>
</body>
</html>
